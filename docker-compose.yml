services:
  backend:
    build:
      context: ./backend
      args:
        APP: api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - mongo
      - redis
      - rabbitmq

  worker:
    build:
      context: ./backend
      args:
        APP: worker
    environment:
      MONGO_URI: mongodb://mongo:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - mongo
      - rabbitmq

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo_data: